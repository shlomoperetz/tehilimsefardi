<!doctype html>
<html lang="es" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .Title }}{{ .Title }} | {{ end }}Tehilim Sefardí — Salmos en Español</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta name="keywords" content="{{ site.Params.keywords }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Tehilim Sefardí">
    <meta property="og:title" content="{{ if .Title }}{{ .Title }} | {{ end }}Tehilim Sefardí">
    <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@100..900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}?v={{ now.Unix }}">
    <link rel="stylesheet" href="{{ "css/layout.css" | relURL }}?v={{ now.Unix }}">
    <link rel="stylesheet" href="{{ "css/tehilim.css" | relURL }}?v={{ now.Unix }}">
    <script>(function(){try{var t=localStorage.getItem('theme');var dark=t?t==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;if(dark)document.documentElement.classList.add('dark-mode');}catch(e){}})();</script>
  </head>
  <body class="{{ if .IsHome }}is-landing{{ end }}">
    <header class="topbar">
      <div class="topbar-inner">

        <div class="brand">
          <a href="/" class="brand-title" id="brand-title">Tehilim Sefardí</a>
          <a href="https://shlomoperetz.com" target="_blank" rel="noopener" class="brand-byline" id="brand-byline">by Shlomo Peretz</a>
        </div>

        <nav class="topbar-nav" aria-label="Controles">
          <div class="tnav-lang-wrap" id="langDropdown">
            <button class="tnav-lang" id="langBtn" onclick="toggleLangMenu()" title="Idioma / שפה">ES</button>
            <div class="lang-menu" id="langMenu" style="display:none">
              <button class="lang-opt" onclick="setLang('es')" data-lang="es">ES <span>Español</span></button>
              <button class="lang-opt" onclick="setLang('en')" data-lang="en">EN <span>English</span></button>
              <button class="lang-opt" onclick="setLang('fr')" data-lang="fr">FR <span>Français</span></button>
              <button class="lang-opt" onclick="setLang('he')" data-lang="he">עב <span>עברית</span></button>
            </div>
          </div>
          <div class="tnav-group">
            <button class="tnav-btn" onclick="adjustFont(1)" title="Aumentar texto">A+</button>
            <button class="tnav-btn" onclick="adjustFont(-1)" title="Reducir texto">A−</button>
            <div class="tnav-sep"></div>
            <button class="tnav-btn" onclick="toggleDarkMode()" id="themeBtn" title="Cambiar tema" aria-label="Cambiar tema">
              <svg id="iconSun" aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
              <svg id="iconMoon" aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
            <div class="tnav-sep"></div>
            <a class="tnav-btn" id="link-apoyar" href="/apoyar/" title="Apoyar el proyecto" aria-label="Donar">
              <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </a>
            <div class="tnav-sep"></div>
            <button class="tnav-btn" onclick="openSearch()" title="Buscar salmo" id="searchBtn" aria-label="Buscar">
              <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
          </div>
        </nav>

      </div>
    </header>

    <!-- Barra de vista — oculta en landing -->
    <div class="controls-bar" id="controlsBar">
      <div class="cbar-inner">
        <button class="cbar-tab tbar-toggle" id="btnHe"       onclick="toggleView('he')">Hebreo</button>
        <button class="cbar-tab tbar-toggle" id="btnTranslit" onclick="toggleView('tr')">Translit.</button>
        <button class="cbar-tab tbar-toggle" id="btnEs"       onclick="toggleView('es')">ES</button>
      </div>
    </div>

    <main class="main-content" id="mainContent">
      <div class="page">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    <footer class="site-footer">
      <a href="https://shlomoperetz.com" target="_blank" rel="noopener" class="footer-author" id="footer-author">Por Shlomo Peretz →</a>
    </footer>

    <nav class="bottombar" aria-label="Navegación">
      <a class="bbtn {{ if eq .RelPermalink "/" }}active{{ end }}" href="/" id="nav-home">Inicio</a>
      <a class="bbtn {{ if in .RelPermalink "/tehilim/" }}active{{ end }}" href="/tehilim/" id="nav-psalms">Salmos</a>
      <a class="bbtn {{ if in .RelPermalink "/categories/" }}active{{ end }}" href="/categories/" id="nav-topics">Temas</a>
    </nav>

    <!-- Search modal -->
    <div id="searchOverlay" onclick="closeSearch()" style="display:none"></div>
    <div id="searchPanel" style="display:none" role="dialog" aria-label="Buscar salmo">
      <div class="search-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4;flex-shrink:0">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="searchInput" placeholder="Buscar por número o título..." oninput="doSearch(this.value)" autocomplete="off" />
        <button class="search-close" onclick="closeSearch()" aria-label="Cerrar">×</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <script src="{{ "js/tehilim.js" | relURL }}?v={{ now.Unix }}" defer></script>
    <script src="{{ "js/i18n.js" | relURL }}?v={{ now.Unix }}" defer></script>
  </body>
</html>
