{{ define "main" }}
<div class="card apoyar-page">
  <div class="apoyar-wrap">
    <a href="/" class="apoyar-back" id="apoyar-back">← Volver</a>
    <svg class="apoyar-heart" viewBox="0 0 24 24" fill="#d4af37" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <h1 class="apoyar-title" id="apoyar-title">Apoyar el proyecto</h1>
    <p class="apoyar-desc" id="apoyar-desc">
      Tehilim Sefardí es un proyecto independiente, sin publicidad y completamente gratuito.<br>
      Si te ha sido útil, puedes contribuir con lo que puedas.
    </p>
    <div class="apoyar-iframe-wrap">
      <iframe id='kofiframe'
        src='https://ko-fi.com/shlomoperetz/?hidefeed=true&widget=true&embed=true&preview=true'
        style='border:none; width:100%; padding:4px 0; max-height:90vh;'
        height='712'
        title='shlomoperetz'>
      </iframe>
    </div>
  </div>
</div>
<style>
.apoyar-page { max-width: 560px; margin: 0 auto; }
.apoyar-wrap { position: relative; padding: 2rem 1.5rem; text-align: center; direction: ltr; }
.apoyar-heart { width: 2.8rem; height: 2.8rem; margin-bottom: 1rem; filter: drop-shadow(0 2px 8px rgba(212,175,55,0.35)); }
.apoyar-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.8rem; }
.apoyar-desc { opacity: 0.6; line-height: 1.7; margin-bottom: 2rem; font-size: 0.95rem; }
.apoyar-iframe-wrap { border-radius: 12px; overflow: hidden; }
.apoyar-back { position: absolute; top: 0; left: 1.5rem; font-size: 0.85rem; opacity: 0.6; text-decoration: none; color: inherit; font-family: var(--ui-font); }
.apoyar-back:hover { opacity: 1; text-decoration: none; }
[dir="rtl"] .apoyar-back { left: auto; right: 1.5rem; }
</style>
<script>
(function () {
  var BACK = { es:'← Volver', en:'← Back', fr:'← Retour', he:'חזרה →' };
  var urlLang = new URLSearchParams(window.location.search).get('lang');
  var lang = urlLang || (function(){try{return localStorage.getItem('ui_lang');}catch(e){return null;}})() || 'es';
  var back = document.getElementById('apoyar-back');
  if (back) back.textContent = BACK[lang] || BACK['es'];
})();
</script>
{{ end }}
